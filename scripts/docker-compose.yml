# docker-compose.yml - Lightweight PostgreSQL + pgvector setup
name: composer_db

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_admin_password
      # Memory-optimized settings
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: |
      postgres 
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Auto-prove (console mode) runner. Gated by the `autoprove` profile so it
  # does NOT come up with `docker compose up`. Invoke with:
  #
  #   docker compose --profile autoprove run --rm autoprove \
  #       console-autoprove --cloud /work/<project> /work/<project>/src/X.sol:X /work/<project>/docs/design.md
  #
  # The container is ephemeral (--rm); database state lives in the
  # postgres_data volume above and persists across container drops.
  autoprove:
    profiles: ["autoprove"]
    image: aicomposer-autoprove:latest
    build:
      context: ..
      dockerfile: scripts/Dockerfile.autoprove
      ssh:
        - default
    depends_on:
      postgres:
        condition: service_healthy
    # Run as the host user so files produced under /work (the `certora/`
    # outputs especially) are owned by the host user, not root. Docker bind
    # mounts pass UIDs through directly, so anything else leaves root-owned
    # files on the host. HOST_UID/HOST_GID default to 1000:1000; override
    # with: export HOST_UID=$(id -u) HOST_GID=$(id -g)
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set in your shell}
      CERTORAKEY: ${CERTORAKEY:-}
      CERTORA_AI_COMPOSER_PGHOST: postgres
      CERTORA_AI_COMPOSER_PGPORT: "5432"
    volumes:
      # Mount the host directory containing your Solidity project(s) and
      # system docs into /work. Defaults to the directory from which you
      # invoke `docker compose`; override with HOST_WORK_DIR.
      - ${HOST_WORK_DIR:-${PWD}}:/work
    working_dir: /work

volumes:
  postgres_data:
